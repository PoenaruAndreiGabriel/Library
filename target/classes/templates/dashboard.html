<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard — Library</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #495057; border-radius: .375rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #0d6efd; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat-card { transition: transform .15s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12) !important; }
    .stat-icon { width: 48px; height: 48px; border-radius: .75rem; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .table thead th { background: #f1f3f5; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
  </style>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/nav :: sidebar}"></div>

    <main class="col-md-10 py-4 px-4">

      <!-- Overdue alert -->
      <div th:if="${overdueLoansCount > 0}"
           class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <span>
          There <span th:text="${overdueLoansCount == 1} ? 'is' : 'are'"></span>
          <strong th:text="${overdueLoansCount}"></strong>
          overdue loan<span th:text="${overdueLoansCount == 1} ? '' : 's'"></span>.
          <a th:href="@{/loans(filter='overdue')}" class="alert-link ms-1">View overdue loans →</a>
        </span>
      </div>

      <!-- Page header -->
      <div class="mb-4">
        <h4 class="fw-semibold mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h4>
        <small class="text-muted">Library overview</small>
      </div>

      <!-- Stat cards -->
      <div class="row g-3 mb-4">

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/books}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                  <i class="bi bi-book"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${totalBooks}">0</div>
                  <div class="text-muted small">Books</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/authors}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-success bg-opacity-10 text-success">
                  <i class="bi bi-person"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${totalAuthors}">0</div>
                  <div class="text-muted small">Authors</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/categories}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                  <i class="bi bi-tag"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${totalCategories}">0</div>
                  <div class="text-muted small">Categories</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/users}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-info bg-opacity-10 text-info">
                  <i class="bi bi-people"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${totalUsers}">0</div>
                  <div class="text-muted small">Users</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/loans(filter='active')}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-secondary bg-opacity-10 text-secondary">
                  <i class="bi bi-arrow-left-right"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${activeLoansCount}">0</div>
                  <div class="text-muted small">Active Loans</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/loans(filter='overdue')}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div th:class="${overdueLoansCount > 0} ? 'stat-icon bg-danger bg-opacity-10 text-danger' : 'stat-icon bg-secondary bg-opacity-10 text-secondary'">
                  <i class="bi bi-exclamation-triangle"></i>
                </div>
                <div>
                  <div th:class="${overdueLoansCount > 0} ? 'fs-3 fw-bold lh-1 text-danger' : 'fs-3 fw-bold lh-1'"
                       th:text="${overdueLoansCount}">0</div>
                  <div class="text-muted small">Overdue Loans</div>
                </div>
              </div>
            </div>
          </a>
        </div>

        <div class="col-sm-6 col-xl-3">
          <a th:href="@{/reservations(filter='active')}" class="text-decoration-none">
            <div class="card stat-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                  <i class="bi bi-bookmark"></i>
                </div>
                <div>
                  <div class="fs-3 fw-bold lh-1" th:text="${activeReservationsCount}">0</div>
                  <div class="text-muted small">Active Reservations</div>
                </div>
              </div>
            </div>
          </a>
        </div>

      </div>

      <!-- Recent active loans -->
      <div class="card">
        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
          <h6 class="mb-0 fw-semibold"><i class="bi bi-clock-history me-2 text-primary"></i>Recent Active Loans</h6>
          <a th:href="@{/loans}" class="btn btn-outline-primary btn-sm">View all</a>
        </div>
        <div class="card-body p-0">
          <div th:if="${recentLoans.isEmpty()}" class="text-center py-4 text-muted">
            <i class="bi bi-inbox d-block mb-1"></i>No active loans.
          </div>
          <div th:unless="${recentLoans.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Book</th>
                  <th>Borrowed</th>
                  <th>Due Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="loan : ${recentLoans}">
                  <td>
                    <a th:href="@{/users/{id}(id=${loan.user.id})}"
                       class="text-decoration-none" th:text="${loan.user.name}"></a>
                  </td>
                  <td>
                    <a th:href="@{/books/{id}(id=${loan.book.id})}"
                       class="text-decoration-none fw-semibold" th:text="${loan.book.title}"></a>
                  </td>
                  <td class="text-muted small" th:text="${loan.borrowDate}"></td>
                  <td>
                    <span th:if="${loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                          class="text-danger fw-semibold" th:text="${loan.dueDate}"></span>
                    <span th:unless="${loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                          th:text="${loan.dueDate}"></span>
                  </td>
                  <td>
                    <span th:if="${loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                          class="badge text-bg-danger">Overdue</span>
                    <span th:unless="${loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                          class="badge text-bg-warning text-dark">Active</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp"
        crossorigin="anonymous"></script>
</body>
</html>
