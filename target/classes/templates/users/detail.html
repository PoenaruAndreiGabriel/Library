<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${user.name} + ' — Library'">User Detail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body{background:#f8f9fa}.navbar-brand{font-weight:700}
    .sidebar{min-height:calc(100vh - 56px);background:#fff;border-right:1px solid #dee2e6}
    .sidebar .nav-link{color:#495057;border-radius:.375rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:#e9ecef;color:#0d6efd}
    .card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .detail-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;font-weight:600}
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid"><div class="row">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <main class="col-md-10 py-4 px-4">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/users}">Users</a></li>
        <li class="breadcrumb-item active" th:text="${user.name}"></li>
      </ol>
    </nav>

    <div class="row justify-content-center"><div class="col-lg-6">
      <div class="card">
        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-semibold"><i class="bi bi-person me-2 text-primary"></i><span th:text="${user.name}"></span></h5>
          <span th:if="${user.role?.name() == 'LIBRARIAN'}" class="badge text-bg-primary" th:text="${user.role}"></span>
          <span th:unless="${user.role?.name() == 'LIBRARIAN'}" class="badge text-bg-secondary" th:text="${user.role}"></span>
        </div>
        <div class="card-body p-4">
          <div class="row g-3">
            <div class="col-12">
              <div class="detail-label">Email</div>
              <div th:text="${user.email}"></div>
            </div>
            <div class="col-6">
              <div class="detail-label">Borrow Limit</div>
              <div class="fw-semibold" th:text="${user.maxBorrowLimit}"></div>
            </div>
            <div th:if="${user.profile != null}" class="col-6">
              <div class="detail-label">Phone</div>
              <div th:text="${user.profile.phoneNumber}"></div>
            </div>
            <div th:if="${user.profile != null}" class="col-12">
              <div class="detail-label">Address</div>
              <div th:text="${user.profile.address}"></div>
            </div>
          </div>
          <hr class="my-3"/>
          <div class="d-flex gap-2 align-items-center">
            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Delete this user?')">
              <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash me-1"></i>Delete</button>
            </form>
            <a th:href="@{/users}" class="btn btn-outline-secondary btn-sm ms-auto"><i class="bi bi-arrow-left me-1"></i>Back to list</a>
          </div>
        </div>
      </div>
    </div></div>

  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp" crossorigin="anonymous"></script>
</body></html>
