<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle} + ' — Library'">Category Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body{background:#f8f9fa}.navbar-brand{font-weight:700}
    .sidebar{min-height:calc(100vh - 56px);background:#fff;border-right:1px solid #dee2e6}
    .sidebar .nav-link{color:#495057;border-radius:.375rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:#e9ecef;color:#0d6efd}
    .card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}.required-star{color:#dc3545}
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid"><div class="row">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <main class="col-md-10 py-4 px-4">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/categories}">Categories</a></li>
        <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
      </ol>
    </nav>

    <div class="row justify-content-center"><div class="col-lg-5">
      <div class="card">
        <div class="card-header bg-white border-bottom py-3">
          <h5 class="mb-0 fw-semibold"><i class="bi bi-tag me-2 text-primary"></i><span th:text="${pageTitle}"></span></h5>
        </div>
        <div class="card-body p-4">
          <form th:action="${category.id != null} ? @{/categories/{id}/edit(id=${category.id})} : @{/categories/new}"
                th:object="${category}" method="post" id="catForm" novalidate>
            <div class="mb-4">
              <label for="name" class="form-label fw-semibold">Name <span class="required-star">*</span></label>
              <input type="text" id="name" th:field="*{name}"
                     class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                     placeholder="e.g. Science Fiction" maxlength="100" required/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-floppy me-1"></i>
                <span th:text="${category.id != null} ? 'Save Changes' : 'Create Category'"></span>
              </button>
              <a th:href="@{/categories}" class="btn btn-outline-secondary"><i class="bi bi-x-lg me-1"></i>Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div></div>

  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp" crossorigin="anonymous"></script>
<script>
  var f=document.getElementById('catForm');
  f.addEventListener('submit',function(e){if(!f.checkValidity()){e.preventDefault();e.stopPropagation();}f.classList.add('was-validated');});
</script>
</body></html>
