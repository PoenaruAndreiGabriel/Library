<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Error — Library</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background-color: #f8f9fa; }
    .error-icon { font-size: 5rem; color: #dee2e6; }
    .error-code { font-size: 6rem; font-weight: 800; color: #dee2e6; line-height: 1; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
    <i class="bi bi-book-half me-2"></i>Library
  </a>
</nav>
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height: calc(100vh - 56px);">
  <div class="text-center px-3">
    <div class="error-code" th:text="${statusCode} ?: 'Error'"></div>
    <i class="bi bi-exclamation-circle error-icon mb-3 d-block"></i>
    <h2 class="fw-semibold mb-2" th:text="${errorTitle} ?: 'An Error Occurred'"></h2>
    <p class="text-muted mb-4" th:text="${errorMessage} ?: 'An unexpected error occurred. Please try again.'"></p>
    <a th:href="@{/dashboard}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Go to Dashboard
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp"
        crossorigin="anonymous"></script>
</body>
</html>
