<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Categories — Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body{background:#f8f9fa}.navbar-brand{font-weight:700}
    .sidebar{min-height:calc(100vh - 56px);background:#fff;border-right:1px solid #dee2e6}
    .sidebar .nav-link{color:#495057;border-radius:.375rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:#e9ecef;color:#0d6efd}
    .card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .table thead th{background:#f1f3f5;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em}
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid"><div class="row">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <main class="col-md-10 py-4 px-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-0 fw-semibold"><i class="bi bi-tag me-2 text-primary"></i>Categories</h4>
        <small class="text-muted" th:text="${categories.size()} + ' category(ies) found'"></small>
      </div>
      <a th:href="@{/categories/new}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Add Category</a>
    </div>

    <div class="card mb-4"><div class="card-body">
      <form th:action="@{/categories}" method="get" class="row g-2 align-items-end" novalidate>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Name</label>
          <input type="text" name="name" class="form-control form-control-sm" placeholder="Search by name…" th:value="${searchName}" maxlength="200"/>
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button type="submit" class="btn btn-outline-primary btn-sm flex-fill"><i class="bi bi-search me-1"></i>Search</button>
          <a th:href="@{/categories}" class="btn btn-outline-secondary btn-sm flex-fill" th:if="${searching}"><i class="bi bi-x-lg"></i></a>
        </div>
      </form>
    </div></div>

    <div class="card"><div class="card-body p-0">
      <div th:if="${categories.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox display-4 d-block mb-2"></i>
        <span th:text="${searching} ? 'No categories match your search.' : 'No categories yet. Add the first one!'"></span>
      </div>
      <div th:unless="${categories.isEmpty()}" class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead><tr><th>#</th><th>Name</th><th class="text-end">Actions</th></tr></thead>
          <tbody>
            <tr th:each="cat, stat : ${categories}">
              <td class="text-muted small" th:text="${stat.index + 1}"></td>
              <td class="fw-semibold" th:text="${cat.name}"></td>
              <td class="text-end">
                <a th:href="@{/categories/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-outline-primary me-1" title="Edit"><i class="bi bi-pencil"></i></a>
                <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Delete this category?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete"><i class="bi bi-trash"></i></button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div></div>

  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp" crossorigin="anonymous"></script>
</body></html>
