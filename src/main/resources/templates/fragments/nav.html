<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<!-- ── Navbar ── -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-book-half me-2"></i>Library</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-1"></i>Books</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/authors}"><i class="bi bi-person me-1"></i>Authors</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/categories}"><i class="bi bi-tag me-1"></i>Categories</a></li>
      <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/users}"><i class="bi bi-people me-1"></i>Users</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/loans}"><i class="bi bi-arrow-left-right me-1"></i>Loans</a></li>
      <li class="nav-item"><a class="nav-link" th:href="@{/reservations}"><i class="bi bi-bookmark me-1"></i>Reservations</a></li>

      <li class="nav-item" sec:authorize="isAnonymous()">
        <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
      </li>
      <li class="nav-item d-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
        <span class="navbar-text text-white-50 small">
          <i class="bi bi-person-circle me-1"></i><span sec:authentication="name">User</span>
        </span>
        <form th:action="@{/logout}" method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-sm btn-outline-light">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<!-- ── Sidebar ── -->
<nav th:fragment="sidebar" class="col-md-2 d-none d-md-block sidebar py-3 px-2">
  <ul class="nav flex-column gap-1">
    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-2"></i>Books</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/authors}"><i class="bi bi-person me-2"></i>Authors</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/categories}"><i class="bi bi-tag me-2"></i>Categories</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/users}"><i class="bi bi-people me-2"></i>Users</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/loans}"><i class="bi bi-arrow-left-right me-2"></i>Loans</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}"><i class="bi bi-bookmark me-2"></i>Reservations</a></li>
  </ul>
</nav>

</html>
