<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>New Loan — Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body{background:#f8f9fa}.navbar-brand{font-weight:700}
    .sidebar{min-height:calc(100vh - 56px);background:#fff;border-right:1px solid #dee2e6}
    .sidebar .nav-link{color:#495057;border-radius:.375rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:#e9ecef;color:#0d6efd}
    .card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}.required-star{color:#dc3545}
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid"><div class="row">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <main class="col-md-10 py-4 px-4">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/loans}">Loans</a></li>
        <li class="breadcrumb-item active">New Loan</li>
      </ol>
    </nav>

    <div class="row justify-content-center"><div class="col-lg-5">
      <div class="card">
        <div class="card-header bg-white border-bottom py-3">
          <h5 class="mb-0 fw-semibold"><i class="bi bi-arrow-left-right me-2 text-primary"></i>New Loan</h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/loans/new}" method="post" id="loanForm" novalidate>
            <div class="mb-3">
              <label for="userId" class="form-label fw-semibold">User <span class="required-star">*</span></label>
              <select id="userId" name="userId" class="form-select" required>
                <option value="">— Select user —</option>
                <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name + ' (' + u.email + ')'}"></option>
              </select>
            </div>
            <div class="mb-4">
              <label for="bookId" class="form-label fw-semibold">Book <span class="required-star">*</span></label>
              <select id="bookId" name="bookId" class="form-select" required>
                <option value="">— Select book —</option>
                <option th:each="b : ${books}" th:value="${b.id}"
                        th:text="${b.title + ' (available: ' + b.availableCopies + ')'}"
                        th:disabled="${b.availableCopies == 0}"></option>
              </select>
              <div class="form-text">Books with 0 available copies cannot be selected.</div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-arrow-left-right me-1"></i>Borrow Book</button>
              <a th:href="@{/loans}" class="btn btn-outline-secondary"><i class="bi bi-x-lg me-1"></i>Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div></div>

  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp" crossorigin="anonymous"></script>
<script>
  var f=document.getElementById('loanForm');
  f.addEventListener('submit',function(e){if(!f.checkValidity()){e.preventDefault();e.stopPropagation();}f.classList.add('was-validated');});
</script>
</body></html>
