<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Loans — Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body{background:#f8f9fa}.navbar-brand{font-weight:700}
    .sidebar{min-height:calc(100vh - 56px);background:#fff;border-right:1px solid #dee2e6}
    .sidebar .nav-link{color:#495057;border-radius:.375rem}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:#e9ecef;color:#0d6efd}
    .card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .table thead th{background:#f1f3f5;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em}
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid"><div class="row">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <main class="col-md-10 py-4 px-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-0 fw-semibold"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Loans</h4>
        <small class="text-muted" th:text="${loans.size()} + ' loan(s)'"></small>
      </div>
      <a th:href="@{/loans/new}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>New Loan</a>
    </div>

    <!-- Filter tabs -->
    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <a class="nav-link" th:classappend="${filter == 'active'} ? 'active' : ''" th:href="@{/loans(filter='active')}">
          <i class="bi bi-clock me-1"></i>Active
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${filter == 'overdue'} ? 'active' : ''" th:href="@{/loans(filter='overdue')}">
          <i class="bi bi-exclamation-triangle me-1"></i>Overdue
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${filter == 'all'} ? 'active' : ''" th:href="@{/loans(filter='all')}">
          <i class="bi bi-list me-1"></i>All
        </a>
      </li>
    </ul>

    <div class="card"><div class="card-body p-0">
      <div th:if="${loans.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox display-4 d-block mb-2"></i>No loans found.
      </div>
      <div th:unless="${loans.isEmpty()}" class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>#</th><th>User</th><th>Book</th>
              <th>Borrow Date</th><th>Due Date</th><th>Return Date</th>
              <th>Status</th><th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="loan, stat : ${loans}">
              <td class="text-muted small" th:text="${stat.index + 1}"></td>
              <td>
                <a th:href="@{/users/{id}(id=${loan.user.id})}" class="text-decoration-none" th:text="${loan.user.name}"></a>
              </td>
              <td>
                <a th:href="@{/books/{id}(id=${loan.book.id})}" class="text-decoration-none" th:text="${loan.book.title}"></a>
              </td>
              <td th:text="${loan.borrowDate}"></td>
              <td>
                <span th:if="${loan.returnDate == null and loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                      class="text-danger fw-semibold" th:text="${loan.dueDate}"></span>
                <span th:unless="${loan.returnDate == null and loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                      th:text="${loan.dueDate}"></span>
              </td>
              <td>
                <span th:if="${loan.returnDate == null}" class="text-muted">—</span>
                <span th:unless="${loan.returnDate == null}" th:text="${loan.returnDate}"></span>
              </td>
              <td>
                <span th:if="${loan.returnDate != null}" class="badge text-bg-success">Returned</span>
                <span th:if="${loan.returnDate == null and loan.dueDate != null and loan.dueDate.isBefore(#temporals.createNow().toLocalDate())}"
                      class="badge text-bg-danger">Overdue</span>
                <span th:if="${loan.returnDate == null and (loan.dueDate == null or !loan.dueDate.isBefore(#temporals.createNow().toLocalDate()))}"
                      class="badge text-bg-warning text-dark">Active</span>
              </td>
              <td class="text-end">
                <form th:if="${loan.returnDate == null}"
                      th:action="@{/loans/{id}/return(id=${loan.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Mark this book as returned?')">
                  <button type="submit" class="btn btn-sm btn-outline-success" title="Return">
                    <i class="bi bi-check-lg me-1"></i>Return
                  </button>
                </form>
                <span th:unless="${loan.returnDate == null}" class="text-muted small">—</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div></div>

  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp" crossorigin="anonymous"></script>
</body></html>
