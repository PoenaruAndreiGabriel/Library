<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${book.title} + ' — Library'">Book Detail — Library</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #495057; border-radius: .375rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #0d6efd; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .detail-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; font-weight: 600; }
  </style>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/nav :: sidebar}"></div>

    <main class="col-md-10 py-4 px-4">

      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/books}">Books</a></li>
          <li class="breadcrumb-item active" th:text="${book.title}"></li>
        </ol>
      </nav>

      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
              <h5 class="mb-0 fw-semibold">
                <i class="bi bi-book me-2 text-primary"></i>
                <span th:text="${book.title}"></span>
              </h5>
              <span th:if="${book.availableCopies > 0}" class="badge text-bg-success">Available</span>
              <span th:unless="${book.availableCopies > 0}" class="badge text-bg-danger">Unavailable</span>
            </div>
            <div class="card-body p-4">

              <div class="row g-4">
                <div class="col-6">
                  <div class="detail-label">ISBN</div>
                  <div class="font-monospace" th:text="${book.isbn}"></div>
                </div>
                <div class="col-6">
                  <div class="detail-label">Category</div>
                  <div>
                    <span th:if="${book.category == null}" class="text-muted">—</span>
                    <span th:unless="${book.category == null}"
                          class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary-subtle fs-6"
                          th:text="${book.category.name}"></span>
                  </div>
                </div>
                <div class="col-12">
                  <div class="detail-label">Authors</div>
                  <div>
                    <span th:if="${book.authors == null or book.authors.isEmpty()}" class="text-muted">—</span>
                    <span th:unless="${book.authors == null or book.authors.isEmpty()}">
                      <span th:each="author : ${book.authors}"
                            class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle me-1"
                            th:text="${author.name}"></span>
                    </span>
                  </div>
                </div>
                <div class="col-6">
                  <div class="detail-label">Total Copies</div>
                  <div class="fw-semibold" th:text="${book.totalCopies}"></div>
                </div>
                <div class="col-6">
                  <div class="detail-label">Available Copies</div>
                  <div>
                    <span th:if="${book.availableCopies > 0}"
                          class="fw-semibold text-success" th:text="${book.availableCopies}"></span>
                    <span th:unless="${book.availableCopies > 0}"
                          class="fw-semibold text-danger">0</span>
                  </div>
                </div>
              </div>

              <hr class="my-4"/>

              <div class="d-flex gap-2 align-items-center">
                <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-primary btn-sm">
                  <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post"
                      onsubmit="return confirm('Delete this book?')">
                  <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash me-1"></i>Delete
                  </button>
                </form>
                <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm ms-auto">
                  <i class="bi bi-arrow-left me-1"></i>Back to list
                </a>
              </div>

            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp"
        crossorigin="anonymous"></script>
</body>
</html>
